user_description: |
  I'm working on an existing quantitative trading codebase that currently implements a modular data ingestion and processing pipeline (prices, fundamentals, sentiment), but does not yet fulfill its real objective.

  The goal is to redesign and evolve this system into a quantitative investment recommender that produces actionable, explainable recommendations for a real investment portfolio across two horizons from the MVP:

  - Long-term investing (weeks to months), based on fundamentals, factors, and slower signals.
  - Intraday trading (intraday swing, hours to same-day), based on prices, volatility, momentum/mean-reversion, liquidity filters, and risk controls.

  The system should output signals, confidence, suggested position sizing, risk metrics, and human-readable explanations, along with robust backtesting and reporting.

  Scalping and fully automated execution are explicitly out of scope for the first phase, but the architecture should allow adding:
  - higher-frequency strategies later
  - paid/premium data providers (news, intraday data) when available

  The immediate focus is on correct problem definition, product requirements, and architecture, reusing valuable parts of the existing pipeline where appropriate, and defining a clear, incremental path from recommender -> paper trading -> automated trading bot.

